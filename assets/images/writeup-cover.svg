<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc">
  <title id="title">Neon pink security writeup cover</title>
  <desc id="desc">A dark technical cover image with neon pink code traces and analysis panels.</desc>
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#050508"/>
      <stop offset="0.52" stop-color="#0b0b12"/>
      <stop offset="1" stop-color="#140711"/>
    </linearGradient>
    <linearGradient id="pink" x1="0" x2="1">
      <stop offset="0" stop-color="#ff2bd6"/>
      <stop offset="1" stop-color="#ff5aa5"/>
    </linearGradient>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <rect width="1600" height="900" fill="url(#bg)"/>
  <g opacity="0.24">
    <path d="M0 160H1600M0 320H1600M0 480H1600M0 640H1600M0 800H1600" stroke="#2a2430"/>
    <path d="M160 0V900M320 0V900M480 0V900M640 0V900M800 0V900M960 0V900M1120 0V900M1280 0V900M1440 0V900" stroke="#2a2430"/>
  </g>
  <g filter="url(#glow)">
    <path d="M226 635C385 395 476 728 655 493S988 225 1347 260" fill="none" stroke="url(#pink)" stroke-width="8"/>
    <circle cx="226" cy="635" r="10" fill="#ff2bd6"/>
    <circle cx="655" cy="493" r="10" fill="#ff2bd6"/>
    <circle cx="1347" cy="260" r="10" fill="#ff2bd6"/>
  </g>
  <g transform="translate(180 170)">
    <rect width="520" height="330" rx="22" fill="#0f1018" stroke="#34203a"/>
    <rect x="0" y="0" width="520" height="54" rx="22" fill="#151521"/>
    <circle cx="34" cy="27" r="8" fill="#ff2bd6"/>
    <circle cx="62" cy="27" r="8" fill="#ff77bc"/>
    <circle cx="90" cy="27" r="8" fill="#6dfce6"/>
    <g font-family="JetBrains Mono, Menlo, monospace" font-size="25" fill="#e8e3ef">
      <text x="34" y="105">def trace(input):</text>
      <text x="68" y="153" fill="#ff77bc">if reachable:</text>
      <text x="102" y="201" fill="#6dfce6">sink.check()</text>
      <text x="68" y="249" fill="#f8f5ff">return report</text>
    </g>
  </g>
  <g transform="translate(900 430)">
    <rect width="430" height="210" rx="22" fill="#0f1018" stroke="#34203a"/>
    <text x="36" y="70" font-family="Inter, Arial, sans-serif" font-size="30" font-weight="800" fill="#ffffff">1-day analysis</text>
    <text x="36" y="121" font-family="JetBrains Mono, Menlo, monospace" font-size="24" fill="#ff77bc">patch.diff -> root cause</text>
    <text x="36" y="165" font-family="JetBrains Mono, Menlo, monospace" font-size="24" fill="#6dfce6">PoC -> mitigation</text>
  </g>
</svg>
