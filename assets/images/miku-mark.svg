<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 96 96" role="img" aria-labelledby="title desc">
  <title id="title">Miku-inspired cyan music mark</title>
  <desc id="desc">A custom cyan twin-tail and waveform badge inspired by virtual singer colors.</desc>
  <defs>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <rect x="7" y="7" width="82" height="82" rx="19" fill="#08080d" stroke="#35f3e5" stroke-width="3"/>
  <path d="M31 26c-9 7-14 18-15 34 8-2 15-7 20-14" fill="none" stroke="#35f3e5" stroke-width="7" stroke-linecap="round" filter="url(#glow)"/>
  <path d="M65 26c9 7 14 18 15 34-8-2-15-7-20-14" fill="none" stroke="#35f3e5" stroke-width="7" stroke-linecap="round" filter="url(#glow)"/>
  <circle cx="48" cy="43" r="19" fill="#161522" stroke="#ff4fd8" stroke-width="3"/>
  <path d="M36 43h5l4-9 6 20 5-12h5" fill="none" stroke="#35f3e5" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
  <path d="M36 67h24" stroke="#ff4fd8" stroke-width="4" stroke-linecap="round"/>
</svg>
