layout: default
---
<section class="page-hero compact">
  <p class="eyebrow">{{ page.eyebrow | default: "Page" }}</p>
  <h1>{{ page.title }}</h1>
  {% if page.description %}
    <p>{{ page.description }}</p>
  {% endif %}
</section>

<article class="prose page-content">
  {{ content }}
</article>
